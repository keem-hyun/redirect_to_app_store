<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Redirecting to App Store...</title>
        <script>
            (function () {
                var ua = navigator.userAgent || navigator.vendor || window.opera;
                var isAndroid = /android/i.test(ua);
                var isIOS = /iphone|ipad|ipod/i.test(ua);
                var target;

                if (isAndroid) {
                    target =
                        "https://play.google.com/store/apps/details?id=com.team.chord&hl=ko";
                } else if (isIOS) {
                    target =
                        "https://apps.apple.com/kr/app/%EC%BD%94%EC%B9%98%EC%BD%94%EC%B9%98/id6759194771";
                }

                if (target) {
                    window.location.replace(target);
                    setTimeout(function () {
                        window.location.href = target;
                    }, 300);
                }
            })();
        </script>
        <style>
            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    "Noto Sans KR", Arial, sans-serif;
                background: #f7f7f8;
                color: #222;
            }
            main {
                text-align: center;
                padding: 24px;
                max-width: 560px;
            }
            a {
                color: #0a58ca;
                text-decoration: none;
            }
            a:hover {
                text-decoration: underline;
            }
        </style>
    </head>
    <body>
        <main>
            <p id="message">Detecting your device...</p>
            <p>
                <a
                    id="store-link"
                    href="https://play.google.com/store/apps/details?id=com.team.chord&hl=ko"
                    >If you are not redirected automatically, click here.</a
                >
            </p>
            <script>
                (function () {
                    var ua = navigator.userAgent || navigator.vendor || window.opera;
                    var isAndroid = /android/i.test(ua);
                    var isIOS = /iphone|ipad|ipod/i.test(ua);
                    var msg = document.getElementById("message");
                    var link = document.getElementById("store-link");

                    if (isAndroid) {
                        msg.textContent = "Redirecting you to Google Play Store...";
                    } else if (isIOS) {
                        msg.textContent = "Redirecting you to App Store...";
                        link.href =
                            "https://apps.apple.com/kr/app/%EC%BD%94%EC%B9%98%EC%BD%94%EC%B9%98/id6759194771";
                        link.textContent = "If you are not redirected automatically, click here.";
                    } else {
                        msg.textContent = "Welcome! Choose your app store below.";
                        link.href =
                            "https://play.google.com/store/apps/details?id=com.team.chord&hl=ko";
                        link.textContent = "Google Play Store";
                    }
                })();
            </script>
            <noscript>
                <p>
                    <a
                        href="https://play.google.com/store/apps/details?id=com.team.chord&hl=ko"
                        >Click here to open Google Play Store.</a
                    >
                </p>
            </noscript>
        </main>
    </body>
</html>
