<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting to Google Play...</title>
  <meta http-equiv="refresh" content="1;url=https://play.google.com/store/apps/details?id=com.netflix.mediaclient">
  <script>
    (function () {
      var target = "https://play.google.com/store/apps/details?id=com.netflix.mediaclient";
      window.location.replace(target);
      setTimeout(function () {
        window.location.href = target;
      }, 300);
    })();
  </script>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
      background: #f7f7f8;
      color: #222;
    }
    main {
      text-align: center;
      padding: 24px;
      max-width: 560px;
    }
    a {
      color: #0a58ca;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main>
    <p>Redirecting you to Google Play Store.</p>
    <p><a href="https://play.google.com/store/apps/details?id=com.netflix.mediaclient">If you are not redirected automatically, click here.</a></p>
    <noscript>
      <p>Automatic redirect is disabled in your browser.</p>
      <p><a href="https://play.google.com/store/apps/details?id=com.netflix.mediaclient">Click here to open Google Play Store.</a></p>
    </noscript>
  </main>
</body>
</html>
